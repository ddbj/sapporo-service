# NIG supercomputer deployment (podman-compose, rootless).
# For the Docker / DinD deployment, use compose.docker.yml instead.
#
# Usage:
#   cp env.dev .env        # dev       (a012:1122)
#   cp env.staging .env    # staging   (a012:1121)
#   cp env.prod .env       # prod      (a011:1121)
#   bash scripts/update_slurm_env.sh
#   mkdir -p runs-$(grep '^SAPPORO_ENV=' .env | cut -d= -f2)
#   podman-compose up -d
#
# The sapporo container delegates workflow execution to Slurm via REST API
# (slurmrestd) using sapporo_config/run.slurm.sh. Workflow engine containers
# run on Slurm compute nodes with rootless podman. Run directories use the
# host absolute path on both sides so that nested podman volume mounts are
# resolved identically on the host and inside the sapporo container.

services:
  sapporo:
    image: ghcr.io/sapporo-wes/sapporo-service:${SAPPORO_VERSION:-2.2.4}
    container_name: sapporo-service-${SAPPORO_ENV}
    environment:
      - SAPPORO_HOST=0.0.0.0
      - SAPPORO_PORT=${SAPPORO_PORT}
      - SAPPORO_DEBUG=${SAPPORO_DEBUG}
      - SAPPORO_RUN_DIR=${PWD}/runs-${SAPPORO_ENV}
      - SAPPORO_BASE_URL=${SAPPORO_BASE_URL}
      - SAPPORO_URL_PREFIX=${SAPPORO_URL_PREFIX:-}
      - SAPPORO_SERVICE_INFO=/app/sapporo_config/service_info.json
      - SAPPORO_AUTH_CONFIG=/app/sapporo_config/auth_config.json
      - SAPPORO_RUN_SH=/app/sapporo_config/run.slurm.sh
      - SAPPORO_ALLOW_ORIGIN=${SAPPORO_ALLOW_ORIGIN:-*}
      - SAPPORO_EXTRA_PODMAN_ARGS=${SAPPORO_EXTRA_PODMAN_ARGS:-}
    volumes:
      - ./sapporo_config:/app/sapporo_config:ro
      - ${PWD}/runs-${SAPPORO_ENV}:${PWD}/runs-${SAPPORO_ENV}:rw
    ports:
      - "0.0.0.0:${SAPPORO_PORT}:${SAPPORO_PORT}"
    working_dir: /app
    command: ["sapporo"]
    userns_mode: keep-id
    init: true
    networks:
      - sapporo-net

networks:
  sapporo-net:
    name: sapporo-nig-net-${SAPPORO_ENV}
